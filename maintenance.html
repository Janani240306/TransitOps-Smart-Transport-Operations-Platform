<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps – Maintenance</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0d1117; --surface:#161b22; --border:#30363d; --text:#c9d1d9; --text-h:#e6edf3; --accent:#58a6ff; --amber:#d2991d; --sidebar-w:220px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; }
        .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); padding:20px 0; }
        .sidebar .logo { padding:0 20px 20px; font-weight:700; font-size:18px; color:var(--text-h); border-bottom:1px solid var(--border); margin-bottom:8px; }
        .nav-item { padding:11px 20px; cursor:pointer; font-size:13px; color:#8b949e; display:flex; align-items:center; gap:10px; border-left:2px solid transparent; text-decoration:none; }
        .nav-item:hover { color:#e6edf3; background:rgba(255,255,255,0.03); }
        .nav-item.active { color:#fff; background:rgba(88,166,255,0.1); border-left-color:var(--accent); }
        .main-area { flex:1; display:flex; overflow:hidden; }
        .left-col { width:42%; padding:20px; border-right:1px solid var(--border); overflow-y:auto; }
        .right-col { width:58%; padding:20px; background:var(--surface); overflow-y:auto; }
        h3 { color:var(--text-h); }
        .form-group { margin-bottom:12px; }
        label { display:block; font-size:11px; color:#8b949e; margin-bottom:4px; text-transform:uppercase; }
        input, select, textarea { width:100%; padding:9px 12px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); resize:vertical; }
        .btn-submit { width:100%; padding:11px; background:var(--amber); color:#000; border:none; border-radius:8px; cursor:pointer; font-weight:600; }
        .btn-logout { margin-top:8px; width:100%; padding:8px; border-radius:16px; border:1px solid var(--border); background:transparent; color:#8b949e; cursor:pointer; }
        table { width:100%; border-collapse:collapse; font-size:12px; background:var(--surface); }
        th { text-align:left; padding:8px; background:#1c2333; color:#8b949e; font-size:10px; text-transform:uppercase; }
        td { padding:8px; border-bottom:1px solid var(--border); }
        .badge { padding:3px 10px; border-radius:12px; font-size:10px; }
        .badge-open { background:rgba(210,153,29,0.2); color:#d2991d; }
        .badge-closed { background:rgba(63,185,80,0.2); color:#3fb950; }
        .btn-sm { padding:4px 10px; border-radius:4px; border:1px solid var(--border); background:transparent; cursor:pointer; font-size:10px; }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-area">
        <div class="left-col">
            <h3>🔧 Log Service</h3>
            <div class="form-group"><label>Vehicle</label><select id="mVehicle"><option value="">-- Select --</option></select></div>
            <div class="form-group"><label>Description</label><textarea id="mDescription" rows="3"></textarea></div>
            <div class="form-group"><label>Service Date</label><input type="date" id="mDate"></div>
            <div class="form-group"><label>Estimated Cost ($)</label><input type="number" id="mCost"></div>
            <button class="btn-submit" onclick="logMaintenance()">🔧 Submit to Workshop</button>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
        <div class="right-col">
            <h3>🔨 Active Workshop Logs</h3>
            <table><thead><tr><th>Vehicle</th><th>Description</th><th>Date</th><th>Cost</th><th>Status</th><th>Action</th></tr></thead><tbody id="maintBody"></tbody></table>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARvELVK_3xQWX_5FBy-9DboIjnTrPgL8c",
            authDomain: "transitops-6bcef.firebaseapp.com",
            projectId: "transitops-6bcef",
            storageBucket: "transitops-6bcef.firebasestorage.app",
            messagingSenderId: "258315580645",
            appId: "1:258315580645:web:ec7822ce147bf6f104900c"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const role = sessionStorage.getItem('transitops_role');
        if (!role || !['fleet_manager','financial_analyst'].includes(role)) { window.location.href = 'dashboard.html'; }

        const pages = {
            fleet_manager: [
                { name:'Dashboard', file:'dashboard.html', icon:'📊' },
                { name:'Vehicles', file:'vehicles.html', icon:'🚛' },
                { name:'Drivers', file:'drivers.html', icon:'👤' },
                { name:'Trip Dispatcher', file:'trips.html', icon:'🗺️' },
                { name:'Maintenance', file:'maintenance.html', icon:'🔧' },
                { name:'Fuel & Expenses', file:'expenses.html', icon:'⛽' },
                { name:'Reports', file:'reports.html', icon:'📋' },
                { name:'Settings', file:'settings.html', icon:'⚙️' }
            ],
            financial_analyst: [
                { name:'Dashboard', file:'dashboard.html', icon:'📊' },
                { name:'Maintenance', file:'maintenance.html', icon:'🔧' },
                { name:'Fuel & Expenses', file:'expenses.html', icon:'⛽' },
                { name:'Reports', file:'reports.html', icon:'📋' }
            ]
        };
        const allowed = pages[role] || pages.fleet_manager;
        let sidebarHTML = '<div class="logo">🚛 TransitOps</div>';
        allowed.forEach(p => {
            sidebarHTML += `<a class="nav-item${p.file==='maintenance.html'?' active':''}" href="${p.file}">${p.icon} ${p.name}</a>`;
        });
        document.getElementById('sidebar').innerHTML = sidebarHTML;

        let allVehicles = [];
        async function init() {
            const vehSnap = await db.collection('vehicles').get();
            allVehicles = vehSnap.docs.map(d => ({id: d.id, ...d.data()}));
            document.getElementById('mVehicle').innerHTML = '<option value="">-- Select Vehicle --</option>' + allVehicles.map(v => `<option value="${v.id}">${v.regNumber||v.name} (${v.name}) [${v.status}]</option>`).join('');
            loadLogs();
        }
        async function loadLogs() {
            const snap = await db.collection('maintenance').orderBy('serviceDate','desc').limit(40).get();
            document.getElementById('maintBody').innerHTML = snap.docs.map(d => {
                const l = d.data();
                return `<tr>
                    <td>${l.vehicleName||'--'}</td><td>${l.description||'--'}</td><td>${l.serviceDate||'--'}</td>
                    <td>$${Number(l.cost||0).toLocaleString()}</td>
                    <td><span class="badge badge-${(l.status||'open').toLowerCase()}">${l.status||'Open'}</span></td>
                    <td>${l.status==='Open'?`<button class="btn-sm" onclick="closeMaintenance('${d.id}','${l.vehicleId}')">✓ Close</button>`:'--'}</td>
                </tr>`;
            }).join('') || '<tr><td colspan="6">No logs.</td></tr>';
        }
        async function logMaintenance() {
            const vehId = document.getElementById('mVehicle').value, desc = document.getElementById('mDescription').value.trim(), date = document.getElementById('mDate').value, cost = Number(document.getElementById('mCost').value)||0;
            if (!vehId || !desc || !date) { alert('Fill all fields.'); return; }
            const vehicle = allVehicles.find(v => v.id === vehId);
            await db.collection('maintenance').add({
                vehicleId: vehId, vehicleName: vehicle ? (vehicle.regNumber||vehicle.name) : 'Unknown',
                description: desc, serviceDate: date, cost, status: 'Open',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection('vehicles').doc(vehId).update({ status: 'In Shop' });
            document.getElementById('mDescription').value=''; document.getElementById('mDate').value=''; document.getElementById('mCost').value='';
            alert('✅ Vehicle sent to workshop.'); init();
        }
        async function closeMaintenance(maintId, vehicleId) {
            await db.collection('maintenance').doc(maintId).update({ status: 'Closed', closedAt: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection('vehicles').doc(vehicleId).update({ status: 'Available' });
            init();
        }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
