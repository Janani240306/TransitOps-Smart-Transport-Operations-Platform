<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps – Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root { --bg:#0d1117; --surface:#161b22; --border:#30363d; --text:#c9d1d9; --text-h:#e6edf3; --accent:#58a6ff; --green:#3fb950; --amber:#d2991d; --red:#f85149; --sidebar-w:220px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }
        .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); padding:20px 0; }
        .sidebar .logo { padding:0 20px 20px; font-weight:700; font-size:18px; color:var(--text-h); border-bottom:1px solid var(--border); margin-bottom:8px; }
        .nav-item { padding:11px 20px; cursor:pointer; font-size:13px; color:#8b949e; display:flex; align-items:center; gap:10px; border-left:2px solid transparent; text-decoration:none; }
        .nav-item:hover { color:#e6edf3; background:rgba(255,255,255,0.03); }
        .nav-item.active { color:#fff; background:rgba(88,166,255,0.1); border-left-color:var(--accent); }
        .main-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .header-ribbon { height:56px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; }
        .user-badge { margin-left:auto; font-size:12px; color:#8b949e; display:flex; align-items:center; gap:8px; }
        .user-badge .avatar { width:30px; height:30px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; }
        .btn-logout { padding:6px 14px; border-radius:16px; border:1px solid var(--border); background:transparent; color:#8b949e; cursor:pointer; }
        .content-scroll { flex:1; overflow-y:auto; padding:20px; }
        .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:14px; margin-bottom:20px; }
        .kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
        .kpi-card .kpi-value { font-size:28px; font-weight:700; color:var(--text-h); }
        .kpi-card .kpi-label { font-size:10px; color:#8b949e; text-transform:uppercase; }
        .panel { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:16px; }
        table { width:100%; border-collapse:collapse; font-size:12px; }
        th { text-align:left; padding:8px; border-bottom:2px solid var(--border); color:#8b949e; font-size:10px; text-transform:uppercase; }
        td { padding:8px; border-bottom:1px solid var(--border); }
        .badge { padding:3px 10px; border-radius:12px; font-size:10px; }
        .badge-dispatched { background:rgba(88,166,255,0.2); color:#58a6ff; }
        .badge-draft { background:#30363d; color:#8b949e; }
        .alert-banner { background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); border-radius:8px; padding:10px; margin-bottom:14px; color:#f85149; display:none; }
        .alert-banner.show { display:block; }
        .compliance-form { margin-top:10px; }
        .compliance-form textarea, .compliance-form select { width:100%; padding:10px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); resize:vertical; font-size:13px; margin-bottom:8px; }
        .btn-submit { padding:8px 16px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-area">
        <div class="header-ribbon">
            <input type="text" placeholder="🔍 Search...">
            <div class="user-badge"><div class="avatar">U</div><span id="roleLabel"></span><button class="btn-logout" onclick="logout()">Logout</button></div>
        </div>
        <div class="content-scroll" id="dashContent"></div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARvELVK_3xQWX_5FBy-9DboIjnTrPgL8c",
            authDomain: "transitops-6bcef.firebaseapp.com",
            projectId: "transitops-6bcef",
            storageBucket: "transitops-6bcef.firebasestorage.app",
            messagingSenderId: "258315580645",
            appId: "1:258315580645:web:ec7822ce147bf6f104900c"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const role = sessionStorage.getItem('transitops_role');
        if (!role) window.location.href = 'index.html';
        document.getElementById('roleLabel').textContent = role.replace(/_/g,' ');

        // Dynamic Sidebar
        const pages = {
            fleet_manager: [
                { name:'Dashboard', file:'dashboard.html', icon:'📊' },
                { name:'Vehicles', file:'vehicles.html', icon:'🚛' },
                { name:'Drivers', file:'drivers.html', icon:'👤' },
                { name:'Trip Dispatcher', file:'trips.html', icon:'🗺️' },
                { name:'Maintenance', file:'maintenance.html', icon:'🔧' },
                { name:'Fuel & Expenses', file:'expenses.html', icon:'⛽' },
                { name:'Reports', file:'reports.html', icon:'📋' },
                { name:'Settings', file:'settings.html', icon:'⚙️' }
            ],
            driver: [
                { name:'Dashboard', file:'dashboard.html', icon:'📊' },
                { name:'Vehicles', file:'vehicles.html', icon:'🚛' },
                { name:'Drivers', file:'drivers.html', icon:'👤' },
                { name:'Trip Dispatcher', file:'trips.html', icon:'🗺️' }
            ],
            safety_officer: [
                { name:'Dashboard', file:'dashboard.html', icon:'📊' },
                { name:'Drivers', file:'drivers.html', icon:'👤' }
            ],
            financial_analyst: [
                { name:'Dashboard', file:'dashboard.html', icon:'📊' },
                { name:'Maintenance', file:'maintenance.html', icon:'🔧' },
                { name:'Fuel & Expenses', file:'expenses.html', icon:'⛽' },
                { name:'Reports', file:'reports.html', icon:'📋' }
            ]
        };
        const allowed = pages[role] || pages.fleet_manager;
        let sidebarHTML = '<div class="logo">🚛 TransitOps</div>';
        allowed.forEach(p => {
            sidebarHTML += `<a class="nav-item${p.file==='dashboard.html'?' active':''}" href="${p.file}">${p.icon} ${p.name}</a>`;
        });
        document.getElementById('sidebar').innerHTML = sidebarHTML;

        async function loadDashboard() {
            const dash = document.getElementById('dashContent');
            let html = '';
            if (role === 'fleet_manager') html += await buildFleetManagerView();
            else if (role === 'driver') html += await buildDriverView();
            else if (role === 'safety_officer') html += await buildSafetyOfficerView();
            else if (role === 'financial_analyst') html += await buildFinancialAnalystView();
            dash.innerHTML = html;
            setTimeout(initCharts, 100);
            if (role === 'driver') {
                const driversSnap = await db.collection('drivers').get();
                const drivers = driversSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                const sel = document.getElementById('driverSelect');
                if (sel) sel.innerHTML = drivers.map(d => `<option value="${d.name}">${d.name} (${d.licenseNumber})</option>`).join('');
            }
        }

        async function fetchAllData() {
            const [vehSnap, tripsSnap, drvSnap, fuelSnap, maintSnap, expSnap, compSnap] = await Promise.all([
                db.collection('vehicles').get(), db.collection('trips').get(), db.collection('drivers').get(),
                db.collection('fuelLogs').get(), db.collection('maintenance').get(),
                db.collection('expenses').get(), db.collection('compliance_reports').orderBy('timestamp','desc').get()
            ]);
            return {
                vehicles: vehSnap.docs.map(d => ({id:d.id, ...d.data()})),
                trips: tripsSnap.docs.map(d => ({id:d.id, ...d.data()})),
                drivers: drvSnap.docs.map(d => ({id:d.id, ...d.data()})),
                fuelLogs: fuelSnap.docs.map(d => d.data()),
                maintenance: maintSnap.docs.map(d => d.data()),
                expenses: expSnap.docs.map(d => d.data()),
                compliance: compSnap.docs.map(d => ({id:d.id, ...d.data()}))
            };
        }

        function renderRecentTrips(trips) {
            const recent = [...trips].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).slice(0,8);
            return `<tr><th>Trip ID</th><th>Destination</th><th>Vehicle</th><th>Status</th></tr>` +
                recent.map(t => `<tr><td>#${t.id?.slice(-6)}</td><td>${t.destination||'--'}</td><td>${t.vehicleName||'--'}</td><td><span class="badge badge-${(t.status||'draft').toLowerCase()}">${t.status}</span></td></tr>`).join('') || '<tr><td colspan="4">No trips</td></tr>';
        }

        function renderComplianceList(reports) {
            if (!reports.length) return '<p>No compliance reports yet.</p>';
            return reports.slice(0,5).map(r => {
                const d = r.timestamp?.toDate ? r.timestamp.toDate().toLocaleString() : 'Just now';
                return `<div style="margin-bottom:8px;padding:8px;background:#1c2333;border-radius:6px;">
                    <strong>${r.submittedBy||'Driver'}</strong> <span style="font-size:10px;color:#8b949e;">${d}</span>
                    <p style="margin:4px 0 0;">${r.text}</p>
                </div>`;
            }).join('');
        }

        async function buildFleetManagerView() {
            const data = await fetchAllData();
            const {vehicles, trips, drivers, compliance} = data;
            let activeV=0, availV=0, maintV=0;
            vehicles.forEach(v => {
                const s = (v.status||'').toLowerCase();
                if (s==='on trip') activeV++; else if (s==='available') availV++; else if (s==='in shop') maintV++;
            });
            let activeTrips = trips.filter(t => t.status==='Dispatched').length;
            let pendingTrips = trips.filter(t => t.status==='Draft').length;
            let onDuty = drivers.filter(d => (d.status||'').toLowerCase()==='on trip').length;
            return `
                <div class="kpi-grid">
                    <div class="kpi-card"><div class="kpi-value">${activeV}</div><div class="kpi-label">Active Vehicles</div></div>
                    <div class="kpi-card"><div class="kpi-value">${availV}</div><div class="kpi-label">Available</div></div>
                    <div class="kpi-card"><div class="kpi-value">${maintV}</div><div class="kpi-label">In Maintenance</div></div>
                    <div class="kpi-card"><div class="kpi-value">${activeTrips}</div><div class="kpi-label">Active Trips</div></div>
                    <div class="kpi-card"><div class="kpi-value">${pendingTrips}</div><div class="kpi-label">Pending Trips</div></div>
                    <div class="kpi-card"><div class="kpi-value">${onDuty}</div><div class="kpi-label">Drivers On Duty</div></div>
                </div>
                <div class="panel"><h3>📋 Recent Trips</h3><table>${renderRecentTrips(trips)}</table></div>
                <div class="panel"><h3>🔍 Compliance Reports from Drivers</h3>${renderComplianceList(compliance)}</div>
            `;
        }

        async function buildDriverView() {
            const data = await fetchAllData();
            const {vehicles, trips, drivers, compliance} = data;
            let availV = vehicles.filter(v => v.status==='Available').length;
            let availD = drivers.filter(d => d.status==='Available').length;
            let activeTrips = trips.filter(t => t.status==='Dispatched').length;
            let pendingTrips = trips.filter(t => t.status==='Draft').length;
            return `
                <div class="kpi-grid">
                    <div class="kpi-card"><div class="kpi-value">${activeTrips}</div><div class="kpi-label">Active Trips</div></div>
                    <div class="kpi-card"><div class="kpi-value">${pendingTrips}</div><div class="kpi-label">Pending Trips</div></div>
                    <div class="kpi-card"><div class="kpi-value">${availV}</div><div class="kpi-label">Available Vehicles</div></div>
                    <div class="kpi-card"><div class="kpi-value">${availD}</div><div class="kpi-label">Available Drivers</div></div>
                </div>
                <div class="panel"><h3>📋 Recent Trips</h3><table>${renderRecentTrips(trips)}</table></div>
                <div class="panel"><h3>📢 Post Compliance / Note</h3>
                    <div class="compliance-form">
                        <label style="font-size:11px;color:#8b949e;">Identify yourself:</label>
                        <select id="driverSelect"><option value="">-- Select your name --</option></select>
                        <textarea id="complianceText" rows="3" placeholder="Enter any compliance issue or note..."></textarea>
                        <button class="btn-submit" onclick="postCompliance()">Submit</button>
                    </div>
                </div>
                <div class="panel"><h3>📄 Recent Compliance Reports</h3>${renderComplianceList(compliance)}</div>
            `;
        }

        async function buildSafetyOfficerView() {
            const data = await fetchAllData();
            const {drivers, compliance} = data;
            let totalDrivers = drivers.length, onTrip = drivers.filter(d => d.status==='On Trip').length, suspended = drivers.filter(d => d.status==='Suspended').length;
            const now = new Date(), thirtyDays = new Date(now.getTime()+30*86400000);
            let expiringSoon = drivers.filter(d => { const exp = d.licenseExpiry ? new Date(d.licenseExpiry) : null; return exp && exp <= thirtyDays && exp >= now; });
            let expired = drivers.filter(d => { const exp = d.licenseExpiry ? new Date(d.licenseExpiry) : null; return exp && exp < now; });
            return `
                <div class="kpi-grid">
                    <div class="kpi-card"><div class="kpi-value">${totalDrivers}</div><div class="kpi-label">Total Drivers</div></div>
                    <div class="kpi-card"><div class="kpi-value">${onTrip}</div><div class="kpi-label">On Trip</div></div>
                    <div class="kpi-card"><div class="kpi-value">${suspended}</div><div class="kpi-label">Suspended</div></div>
                </div>
                ${expiringSoon.length ? `<div class="alert-banner show">⚠ ${expiringSoon.length} driver(s) licence expiring within 30 days: ${expiringSoon.map(d=>d.name).join(', ')}</div>` : ''}
                ${expired.length ? `<div class="alert-banner show">🚨 ${expired.length} driver(s) have EXPIRED licences: ${expired.map(d=>d.name).join(', ')}</div>` : ''}
                <h3>📊 Safety Scores</h3>
                <table>
                    <tr><th>Driver</th><th>Score</th><th>Status</th></tr>
                    ${drivers.sort((a,b)=>(b.safetyScore||0)-(a.safetyScore||0)).slice(0,10).map(d=>`<tr><td>${d.name}</td><td>${d.safetyScore||'--'}/100</td><td>${d.status||'--'}</td></tr>`).join('')}
                </table>
                <div class="panel" style="margin-top:20px;"><h3>🔍 Compliance Reports</h3>${renderComplianceList(compliance)}</div>
            `;
        }

        async function buildFinancialAnalystView() {
            const data = await fetchAllData();
            const {fuelLogs, maintenance, expenses, vehicles, trips} = data;
            const totalFuelCost = fuelLogs.reduce((s,l)=>s+(Number(l.cost)||0),0);
            const totalMaintCost = maintenance.reduce((s,m)=>s+(Number(m.cost)||0),0);
            const totalExpOther = expenses.reduce((s,e)=>s+(Number(e.amount)||0),0);
            const totalOpCost = totalFuelCost + totalMaintCost + totalExpOther;
            const totalLiters = fuelLogs.reduce((s,l)=>s+(Number(l.liters)||0),0);
            const totalDist = trips.reduce((s,t)=>s+(Number(t.plannedDistance)||0),0);
            const fuelEff = totalLiters ? (totalDist/totalLiters).toFixed(2) : '--';
            const totalAcq = vehicles.reduce((s,v)=>s+(Number(v.acquisitionCost)||0),0);
            const revenue = totalDist * 2.5;
            const roi = totalAcq ? (((revenue - totalOpCost) / totalAcq)*100).toFixed(1) : '--';
            const monthlyFuel = {}; fuelLogs.forEach(l => { const m=(l.date||'').substring(0,7); if(m) monthlyFuel[m]=(monthlyFuel[m]||0)+(Number(l.liters)||0); });
            window._fuelChartData = { labels: Object.keys(monthlyFuel).sort(), values: Object.values(monthlyFuel) };
            return `
                <div class="kpi-grid">
                    <div class="kpi-card"><div class="kpi-value">$${totalOpCost.toLocaleString()}</div><div class="kpi-label">Total Op. Cost</div></div>
                    <div class="kpi-card"><div class="kpi-value">$${totalFuelCost.toLocaleString()}</div><div class="kpi-label">Fuel Cost</div></div>
                    <div class="kpi-card"><div class="kpi-value">$${totalMaintCost.toLocaleString()}</div><div class="kpi-label">Maintenance Cost</div></div>
                    <div class="kpi-card"><div class="kpi-value">${fuelEff} km/L</div><div class="kpi-label">Fuel Efficiency</div></div>
                    <div class="kpi-card"><div class="kpi-value">${roi}%</div><div class="kpi-label">ROI</div></div>
                </div>
                <div class="panel"><h3>⛽ Fuel Consumption</h3><canvas id="spendChart" height="150"></canvas></div>
                <div class="panel"><h3>🔧 Top Maintenance Spenders</h3>
                    <table>
                        <tr><th>Vehicle</th><th>Total Cost</th></tr>
                        ${Object.entries(maintenance.reduce((acc,m)=>{ acc[m.vehicleName||'?']=(acc[m.vehicleName||'?']||0)+(Number(m.cost)||0); return acc; },{})).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([name,cost])=>`<tr><td>${name}</td><td>$${cost.toLocaleString()}</td></tr>`).join('')}
                    </table>
                </div>
            `;
        }

        function initCharts() {
            if (role === 'financial_analyst' && window._fuelChartData) {
                const ctx = document.getElementById('spendChart')?.getContext('2d');
                if (ctx) {
                    const {labels, values} = window._fuelChartData;
                    new Chart(ctx, { type:'bar', data:{ labels, datasets:[{ label:'Liters', data:values, backgroundColor:'#58a6ff' }] } });
                }
            }
        }

        window.postCompliance = async function() {
            const sel = document.getElementById('driverSelect');
            const driverName = sel ? sel.value : '';
            if (!driverName) { alert('Please select your name from the list.'); return; }
            const text = document.getElementById('complianceText')?.value.trim();
            if (!text) return alert('Enter compliance note.');
            await db.collection('compliance_reports').add({
                text, submittedBy: driverName, role: 'driver',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('complianceText').value = '';
            loadDashboard();
        };

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
