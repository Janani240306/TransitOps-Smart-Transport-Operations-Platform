<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps – Reports</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root { --bg:#0d1117; --surface:#161b22; --border:#30363d; --text:#c9d1d9; --text-h:#e6edf3; --accent:#58a6ff; --sidebar-w:220px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; }
        .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); padding:20px 0; }
        .sidebar .logo { padding:0 20px 20px; font-weight:700; font-size:18px; color:var(--text-h); border-bottom:1px solid var(--border); margin-bottom:8px; }
        .nav-item { padding:11px 20px; cursor:pointer; font-size:13px; color:#8b949e; display:flex; align-items:center; gap:10px; border-left:2px solid transparent; text-decoration:none; }
        .nav-item:hover { color:#e6edf3; background:rgba(255,255,255,0.03); }
        .nav-item.active { color:#fff; background:rgba(88,166,255,0.1); border-left-color:var(--accent); }
        .main-area { flex:1; overflow-y:auto; padding:20px; }
        .header-row { display:flex; gap:12px; align-items:center; margin-bottom:16px; }
        .btn-export { padding:9px 18px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; }
        .btn-logout { padding:6px 14px; border-radius:16px; border:1px solid var(--border); background:transparent; color:#8b949e; cursor:pointer; }
        .kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px; }
        .kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
        .kpi-card .val { font-size:24px; color:var(--text-h); }
        .charts-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .chart-panel { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main-area">
        <div class="header-row">
            <h2>📋 Reports & Export</h2>
            <button class="btn-export" onclick="exportCSV()">📥 CSV</button>
            <button class="btn-export" onclick="window.print()">📄 PDF</button>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
        <div class="kpi-row">
            <div class="kpi-card"><div class="val" id="rFuelEff">--</div><div class="lbl">Fuel Efficiency (km/L)</div></div>
            <div class="kpi-card"><div class="val" id="rUtilization">--%</div><div class="lbl">Fleet Utilization</div></div>
            <div class="kpi-card"><div class="val" id="rROI">--%</div><div class="lbl">Vehicle ROI</div></div>
        </div>
        <div class="charts-row">
            <div class="chart-panel"><h4>Fuel Economy</h4><canvas id="fuelChart" height="150"></canvas></div>
            <div class="chart-panel"><h4>Highest Spending Vehicles</h4><canvas id="spendingChart" height="150"></canvas></div>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARvELVK_3xQWX_5FBy-9DboIjnTrPgL8c",
            authDomain: "transitops-6bcef.firebaseapp.com",
            projectId: "transitops-6bcef",
            storageBucket: "transitops-6bcef.firebasestorage.app",
            messagingSenderId: "258315580645",
            appId: "1:258315580645:web:ec7822ce147bf6f104900c"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const role = sessionStorage.getItem('transitops_role');
        if (!role || !['fleet_manager','financial_analyst'].includes(role)) { window.location.href = 'dashboard.html'; }

        const pages = {
            fleet_manager: [
                { name:'Dashboard', file:'dashboard.html', icon:'📊' },
                { name:'Vehicles', file:'vehicles.html', icon:'🚛' },
                { name:'Drivers', file:'drivers.html', icon:'👤' },
                { name:'Trip Dispatcher', file:'trips.html', icon:'🗺️' },
                { name:'Maintenance', file:'maintenance.html', icon:'🔧' },
                { name:'Fuel & Expenses', file:'expenses.html', icon:'⛽' },
                { name:'Reports', file:'reports.html', icon:'📋' },
                { name:'Settings', file:'settings.html', icon:'⚙️' }
            ],
            financial_analyst: [
                { name:'Dashboard', file:'dashboard.html', icon:'📊' },
                { name:'Maintenance', file:'maintenance.html', icon:'🔧' },
                { name:'Fuel & Expenses', file:'expenses.html', icon:'⛽' },
                { name:'Reports', file:'reports.html', icon:'📋' }
            ]
        };
        const allowed = pages[role] || pages.fleet_manager;
        let sidebarHTML = '<div class="logo">🚛 TransitOps</div>';
        allowed.forEach(p => {
            sidebarHTML += `<a class="nav-item${p.file==='reports.html'?' active':''}" href="${p.file}">${p.icon} ${p.name}</a>`;
        });
        document.getElementById('sidebar').innerHTML = sidebarHTML;

        let fuelChartInst, spendingChartInst;
        async function loadReports() {
            const [vehSnap, fuelSnap, tripSnap, maintSnap] = await Promise.all([
                db.collection('vehicles').get(), db.collection('fuelLogs').get(),
                db.collection('trips').get(), db.collection('maintenance').get()
            ]);
            const vehicles = vehSnap.docs.map(d => ({id:d.id,...d.data()}));
            const totalV = vehicles.length||1;
            const activeV = vehicles.filter(v => (v.status||'').toLowerCase()==='on trip').length;
            document.getElementById('rUtilization').textContent = Math.round((activeV/totalV)*100)+'%';

            const fuelLogs = fuelSnap.docs.map(d=>d.data());
            const totalLiters = fuelLogs.reduce((s,l)=>s+(Number(l.liters)||0),0);
            const trips = tripSnap.docs.map(d=>d.data());
            const totalDist = trips.reduce((s,t)=>s+(Number(t.plannedDistance)||0),0);
            document.getElementById('rFuelEff').textContent = totalLiters ? (totalDist/totalLiters).toFixed(2) : '--';

            const totalMaint = maintSnap.docs.reduce((s,d)=>s+(Number(d.data().cost)||0),0);
            const totalFuelCost = fuelLogs.reduce((s,l)=>s+(Number(l.cost)||0),0);
            const totalAcq = vehicles.reduce((s,v)=>s+(Number(v.acquisitionCost)||0),0);
            const revenue = totalDist*2.5;
            document.getElementById('rROI').textContent = totalAcq ? (((revenue-(totalMaint+totalFuelCost))/totalAcq)*100).toFixed(1)+'%' : '--';

            const monthlyFuel = {}; fuelLogs.forEach(l => { const m=(l.date||'').substring(0,7); if(m) monthlyFuel[m]=(monthlyFuel[m]||0)+(Number(l.liters)||0); });
            renderFuelChart(Object.keys(monthlyFuel).sort(), Object.values(monthlyFuel));

            const spendMap = {}; fuelLogs.forEach(l => { spendMap[l.vehicleId]=(spendMap[l.vehicleId]||0)+(Number(l.cost)||0); });
            maintSnap.docs.forEach(d => { const l=d.data(); spendMap[l.vehicleId]=(spendMap[l.vehicleId]||0)+(Number(l.cost)||0); });
            const sorted = Object.entries(spendMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
            const names = {}; vehicles.forEach(v => { names[v.id] = v.regNumber||v.name||v.id.slice(-6); });
            renderSpendingChart(sorted.map(s=>names[s[0]]||s[0].slice(-6)), sorted.map(s=>s[1]));
        }
        function renderFuelChart(labels,data){
            const ctx = document.getElementById('fuelChart').getContext('2d'); if(fuelChartInst) fuelChartInst.destroy();
            fuelChartInst = new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'Liters',data,backgroundColor:'#58a6ff'}]}});
        }
        function renderSpendingChart(labels,data){
            const ctx = document.getElementById('spendingChart').getContext('2d'); if(spendingChartInst) spendingChartInst.destroy();
            spendingChartInst = new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'Cost ($)',data,backgroundColor:'#f85149'}]},options:{indexAxis:'y'}});
        }
        async function exportCSV() {
            const snap = await db.collection('vehicles').get();
            const rows = [['RegNumber','Name','Type','MaxCap','Odo','AcqCost','Status']];
            snap.docs.forEach(d => { const v=d.data(); rows.push([v.regNumber,v.name,v.type,v.maxCapacity,v.odometer,v.acquisitionCost,v.status]); });
            const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
            const blob = new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='vehicles.csv'; a.click();
        }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
        loadReports();
    </script>
</body>
</html>
